version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/packages/go-shared"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Shanghai"
    groups:
      go-shared-go-modules:
        patterns:
          - "*"
    open-pull-requests-limit: 3

  - package-ecosystem: "gomod"
    directory: "/services/commerce"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Shanghai"
    groups:
      commerce-go-modules:
        patterns:
          - "*"
    open-pull-requests-limit: 3

  - package-ecosystem: "gomod"
    directory: "/services/gateway-bff"
