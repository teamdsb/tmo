---
name: gateway-miniapp-ci

'on':
  pull_request:
    paths:
      - "apps/miniapp/**"
      - "services/gateway-bff/**"
      - "services/commerce/**"
      - "services/identity/**"
      - "services/payment/**"
      - "infra/dev/**"
      - "tools/scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "go.work"
      - "go.work.sum"
      - ".github/workflows/gateway-miniapp-ci.yml"
  workflow_dispatch:

jobs:
  fullstack-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            git fetch --no-tags --depth=1 origin "$base_sha" "$head_sha" || true
            git diff --name-only "$base_sha" "$head_sha" > /tmp/changed-files.txt
          else
            git diff --name-only HEAD~1 HEAD > /tmp/changed-files.txt || git ls-files > /tmp/changed-files.txt
          fi

          fullstack_required=false
          dependency_only=true
          module_dirs_file=/tmp/module-dirs.txt
          : > "$module_dirs_file"

          add_module_dir() {
            local module_dir="$1"
            if ! grep -qxF "$module_dir" "$module_dirs_file"; then
              echo "$module_dir" >> "$module_dirs_file"
            fi
          }

          is_dependency_file() {
            case "$1" in
              packages/go-shared/go.mod|packages/go-shared/go.sum) return 0 ;;
              services/commerce/go.mod|services/commerce/go.sum|services/commerce/Dockerfile*) return 0 ;;
              services/gateway-bff/go.mod|services/gateway-bff/go.sum|services/gateway-bff/Dockerfile*) return 0 ;;
              services/identity/go.mod|services/identity/go.sum|services/identity/Dockerfile*) return 0 ;;
              services/payment/go.mod|services/payment/go.sum|services/payment/Dockerfile*) return 0 ;;
              *) return 1 ;;
            esac
          }

          while IFS= read -r changed_file; do
            [[ -z "$changed_file" ]] && continue

            case "$changed_file" in
              packages/go-shared/go.mod|packages/go-shared/go.sum) add_module_dir "packages/go-shared" ;;
              services/commerce/go.mod|services/commerce/go.sum|services/commerce/Dockerfile*) add_module_dir "services/commerce" ;;
              services/gateway-bff/go.mod|services/gateway-bff/go.sum|services/gateway-bff/Dockerfile*) add_module_dir "services/gateway-bff" ;;
              services/identity/go.mod|services/identity/go.sum|services/identity/Dockerfile*) add_module_dir "services/identity" ;;
              services/payment/go.mod|services/payment/go.sum|services/payment/Dockerfile*) add_module_dir "services/payment" ;;
            esac

            if ! is_dependency_file "$changed_file"; then
              dependency_only=false
            fi

            case "$changed_file" in
              apps/miniapp/**|infra/dev/**|tools/scripts/**|package.json|pnpm-lock.yaml|go.work|go.work.sum|.github/workflows/gateway-miniapp-ci.yml)
                fullstack_required=true
                ;;
              services/commerce/**|services/gateway-bff/**|services/identity/**|services/payment/**)
                if ! is_dependency_file "$changed_file"; then
                  fullstack_required=true
                fi
                ;;
            esac
          done < /tmp/changed-files.txt

          if [[ "$dependency_only" == "true" && -s "$module_dirs_file" ]]; then
            fullstack_required=false
          fi

          if [[ "$fullstack_required" != "true" && ! -s "$module_dirs_file" ]]; then
            fullstack_required=true
          fi

          {
            echo "fullstack_required=$fullstack_required"
            echo "module_dirs<<EOF"
            cat "$module_dirs_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Changed files:"
          cat /tmp/changed-files.txt
          echo "Module dirs:"
          cat "$module_dirs_file"
          echo "fullstack_required=$fullstack_required"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          check-latest: true
          cache-dependency-path: |
            packages/go-shared/go.sum
            services/commerce/go.sum
            services/gateway-bff/go.sum
            services/identity/go.sum
            services/payment/go.sum

      - name: Test dependency-only Go modules
        if: steps.changes.outputs.fullstack_required != 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r module_dir; do
            [[ -z "$module_dir" ]] && continue
            echo "::group::go test $module_dir"
            (cd "$module_dir" && go test ./...)
            echo "::endgroup::"
          done <<< "${{ steps.changes.outputs.module_dirs }}"

      - name: Setup pnpm
        if: steps.changes.outputs.fullstack_required == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        if: steps.changes.outputs.fullstack_required == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.changes.outputs.fullstack_required == 'true'
        run: pnpm install --frozen-lockfile

      - name: Start dev stack
        if: steps.changes.outputs.fullstack_required == 'true'
        run: bash tools/scripts/dev-stack-up.sh

      - name: Verify backend health
        if: steps.changes.outputs.fullstack_required == 'true'
        run: bash tools/scripts/dev-stack-health.sh

      - name: Miniapp preflight gate
        if: steps.changes.outputs.fullstack_required == 'true'
        run: pnpm -C apps/miniapp preflight:weapp

      - name: Print preflight result
        if: steps.changes.outputs.fullstack_required == 'true'
        run: cat apps/miniapp/.logs/preflight/result.json

      - name: Verify gateway real-mode auth
        if: steps.changes.outputs.fullstack_required == 'true'
        run: bash tools/scripts/gateway-verify-real.sh

      - name: Miniapp HTTP smoke
        if: steps.changes.outputs.fullstack_required == 'true'
        run: bash tools/scripts/miniapp-http-smoke.sh

      - name: Miniapp typecheck
        if: steps.changes.outputs.fullstack_required == 'true'
        run: pnpm -C apps/miniapp lint:types

      - name: Miniapp unit tests
        if: steps.changes.outputs.fullstack_required == 'true'
        run: pnpm -C apps/miniapp test

      - name: Dump backend logs on failure
        if: failure() && steps.changes.outputs.fullstack_required == 'true'
        run: |
          docker compose --env-file infra/dev/backend.env.local \
            -f infra/dev/docker-compose.yml \
            -f infra/dev/docker-compose.backend.yml \
            logs --no-color > infra/dev/backend-ci.log

      - name: Upload backend logs
        if: failure() && steps.changes.outputs.fullstack_required == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: backend-ci-logs
          path: infra/dev/backend-ci.log

      - name: Upload miniapp quality artifacts
        if: always() && steps.changes.outputs.fullstack_required == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: miniapp-quality-artifacts
          path: |
            apps/miniapp/.logs/preflight
            apps/miniapp/.logs/weapp

  preflight-fault-injection:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            git fetch --no-tags --depth=1 origin "$base_sha" "$head_sha" || true
            git diff --name-only "$base_sha" "$head_sha" > /tmp/changed-files.txt
          else
            git diff --name-only HEAD~1 HEAD > /tmp/changed-files.txt || git ls-files > /tmp/changed-files.txt
          fi

          fullstack_required=false
          dependency_only=true
          module_dirs_file=/tmp/module-dirs.txt
          : > "$module_dirs_file"

          add_module_dir() {
            local module_dir="$1"
            if ! grep -qxF "$module_dir" "$module_dirs_file"; then
              echo "$module_dir" >> "$module_dirs_file"
            fi
          }

          is_dependency_file() {
            case "$1" in
              packages/go-shared/go.mod|packages/go-shared/go.sum) return 0 ;;
              services/commerce/go.mod|services/commerce/go.sum|services/commerce/Dockerfile*) return 0 ;;
              services/gateway-bff/go.mod|services/gateway-bff/go.sum|services/gateway-bff/Dockerfile*) return 0 ;;
              services/identity/go.mod|services/identity/go.sum|services/identity/Dockerfile*) return 0 ;;
              services/payment/go.mod|services/payment/go.sum|services/payment/Dockerfile*) return 0 ;;
              *) return 1 ;;
            esac
          }

          while IFS= read -r changed_file; do
            [[ -z "$changed_file" ]] && continue

            case "$changed_file" in
              packages/go-shared/go.mod|packages/go-shared/go.sum) add_module_dir "packages/go-shared" ;;
              services/commerce/go.mod|services/commerce/go.sum|services/commerce/Dockerfile*) add_module_dir "services/commerce" ;;
              services/gateway-bff/go.mod|services/gateway-bff/go.sum|services/gateway-bff/Dockerfile*) add_module_dir "services/gateway-bff" ;;
              services/identity/go.mod|services/identity/go.sum|services/identity/Dockerfile*) add_module_dir "services/identity" ;;
              services/payment/go.mod|services/payment/go.sum|services/payment/Dockerfile*) add_module_dir "services/payment" ;;
            esac

            if ! is_dependency_file "$changed_file"; then
              dependency_only=false
            fi

            case "$changed_file" in
              apps/miniapp/**|infra/dev/**|tools/scripts/**|package.json|pnpm-lock.yaml|go.work|go.work.sum|.github/workflows/gateway-miniapp-ci.yml)
                fullstack_required=true
                ;;
              services/commerce/**|services/gateway-bff/**|services/identity/**|services/payment/**)
                if ! is_dependency_file "$changed_file"; then
                  fullstack_required=true
                fi
                ;;
            esac
          done < /tmp/changed-files.txt

          if [[ "$dependency_only" == "true" && -s "$module_dirs_file" ]]; then
            fullstack_required=false
          fi

          if [[ "$fullstack_required" != "true" && ! -s "$module_dirs_file" ]]; then
            fullstack_required=true
          fi

          echo "fullstack_required=$fullstack_required" >> "$GITHUB_OUTPUT"
          echo "fullstack_required=$fullstack_required"

      - name: Setup Go
        if: steps.changes.outputs.fullstack_required == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          check-latest: true
          cache-dependency-path: |
            packages/go-shared/go.sum
            services/commerce/go.sum
            services/gateway-bff/go.sum
            services/identity/go.sum
            services/payment/go.sum

      - name: Setup pnpm
        if: steps.changes.outputs.fullstack_required == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        if: steps.changes.outputs.fullstack_required == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.changes.outputs.fullstack_required == 'true'
        run: pnpm install --frozen-lockfile

      - name: Start dev stack
        if: steps.changes.outputs.fullstack_required == 'true'
        run: bash tools/scripts/dev-stack-up.sh

      - name: Inject DB fault and assert preflight fails
        if: steps.changes.outputs.fullstack_required == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p apps/miniapp/.logs/preflight
          docker stop tmo-postgres >/dev/null

          set +e
          pnpm -C apps/miniapp preflight:weapp > apps/miniapp/.logs/preflight/fault-injection.log 2>&1
          preflight_exit=$?
          set -e

          if [[ "$preflight_exit" -eq 0 ]]; then
            echo "expected preflight to fail when postgres is stopped" >&2
            cat apps/miniapp/.logs/preflight/fault-injection.log >&2
            exit 1
          fi

          if ! grep -Eq 'failed to list categories|failed to list products|\[miniapp-http-smoke\].*failed:' apps/miniapp/.logs/preflight/fault-injection.log; then
            echo "preflight failure log does not contain expected category/product failure signal" >&2
            cat apps/miniapp/.logs/preflight/fault-injection.log >&2
            exit 1
          fi

          if ! grep -q '\[dev-diagnose-db\] diagnosis:' apps/miniapp/.logs/preflight/fault-injection.log; then
            echo "preflight failure log does not contain db diagnosis summary" >&2
            cat apps/miniapp/.logs/preflight/fault-injection.log >&2
            exit 1
          fi

          if [[ ! -f apps/miniapp/.logs/preflight/result.json ]]; then
            echo "preflight did not write result.json" >&2
            exit 1
          fi

          node -e '
          const fs = require("node:fs")
          const payload = JSON.parse(fs.readFileSync("apps/miniapp/.logs/preflight/result.json", "utf8"))
          if (payload.status !== "fail") {
            throw new Error("unexpected preflight result status: " + payload.status)
          }
          if (!payload.diagnoseRan) {
            throw new Error("diagnoseRan should be true in fault injection mode")
          }
          '

      - name: Restore postgres and verify stack health
        if: always() && steps.changes.outputs.fullstack_required == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker start tmo-postgres >/dev/null || true
          bash tools/scripts/dev-stack-health.sh

      - name: Skip fault injection for dependency-only changes
        if: steps.changes.outputs.fullstack_required != 'true'
        run: echo "Skipping Docker fault-injection for dependency-only Go/Dockerfile changes."

      - name: Dump backend logs on failure
        if: failure() && steps.changes.outputs.fullstack_required == 'true'
        run: |
          docker compose --env-file infra/dev/backend.env.local \
            -f infra/dev/docker-compose.yml \
            -f infra/dev/docker-compose.backend.yml \
            logs --no-color > infra/dev/backend-fault-injection.log

      - name: Upload fault-injection artifacts
        if: always() && steps.changes.outputs.fullstack_required == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: preflight-fault-injection-artifacts
          path: |
            apps/miniapp/.logs/preflight
            infra/dev/backend-fault-injection.log
