services:
  identity:
    build:
      context: ../..
      dockerfile: services/identity/Dockerfile.dev
      args:
        GOPROXY: "${DEV_STACK_GOPROXY:-https://goproxy.cn,direct}"
        GOSUMDB: "${DEV_STACK_GOSUMDB:-off}"
        GONOSUMDB: "${DEV_STACK_GONOSUMDB:-*}"
    working_dir: /workspace
    entrypoint: []
    command:
      - /go/bin/air
      - -c
      - services/identity/.air.toml
    environment:
      GOPROXY: "${DEV_STACK_GOPROXY:-https://goproxy.cn,direct}"
      GOSUMDB: "${DEV_STACK_GOSUMDB:-off}"
      GONOSUMDB: "${DEV_STACK_GONOSUMDB:-*}"
    volumes:
      - ${TMO_ACTIVE_WORKTREE:-../..}:/workspace
      - tmo-go-mod-cache:/go/pkg/mod
      - tmo-go-build-cache:/root/.cache/go-build

  commerce:
