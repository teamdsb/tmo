openapi: 3.1.0
info:
  title: Procurement Mini Program - Admin API
  version: 0.1.0
  description: |
    v1 API contract for customer/staff mini programs + Admin Web.
    Conventions:
    - JSON field naming: camelCase
    - Time: RFC3339 date-time strings
    - IDs: UUID strings
    - Auth: Bearer JWT access token
    - Idempotency: send `Idempotency-Key` for order submit and payment create
servers:
- url: https://api.example.com
tags:
- name: Admin
security:
- bearerAuth: []
paths:
  "/admin/sales-users":
    get:
      tags:
      - Admin
      summary: List active sales users
      parameters:
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
      - in: query
        name: pageSize
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PagedSalesUserList"
  "/admin/users":
    get:
      tags:
      - Admin
      summary: List admin users for admin console
      parameters:
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: role
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
      - in: query
        name: pageSize
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PagedAdminUserList"
  "/admin/customers":
    get:
      tags:
      - Admin
      summary: List customers for admin transfer and tagging
      parameters:
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: ownerSalesUserId
        schema:
          type: string
          format: uuid
      - in: query
        name: tagIds
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
            format: uuid
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
      - in: query
        name: pageSize
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PagedAdminCustomerList"
  "/admin/customers/transfer":
    post:
      tags:
      - Admin
      summary: Batch transfer customer ownership to another sales
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/TransferCustomersRequest"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/BatchTransferResult"
  "/admin/customers/{customerId}/transfer":
    post:
      tags:
      - Admin
      summary: Transfer customer ownership to another sales
      parameters:
      - in: path
        name: customerId
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/TransferCustomerRequest"
      responses:
        '204':
          description: No Content
  "/admin/customers/{customerId}/promote-to-sales":
    post:
      tags:
      - Admin
      summary: Promote customer account to sales
      parameters:
      - in: path
        name: customerId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PromoteCustomerToSalesResponse"
  "/admin/customer-tags":
    get:
      tags:
      - Admin
      summary: List customer tags
      parameters:
      - in: query
        name: includeInactive
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CustomerTagListResponse"
    post:
      tags:
      - Admin
      summary: Create customer tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateCustomerTagRequest"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CustomerTag"
  "/admin/customer-tags/{tagId}":
    patch:
      tags:
      - Admin
      summary: Update customer tag
      parameters:
      - in: path
        name: tagId
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UpdateCustomerTagRequest"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CustomerTag"
  "/admin/customers/tags:batch-update":
    post:
      tags:
      - Admin
      summary: Batch add or remove customer tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/BatchUpdateCustomerTagsRequest"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/BatchTagUpdateResult"
  "/admin/customers/{customerId}/finance-profile":
    get:
      tags:
      - Admin
      summary: Get customer finance profile
      parameters:
      - in: path
        name: customerId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AdminCustomerFinanceProfile"
    patch:
      tags:
      - Admin
      summary: Update customer finance profile
      parameters:
      - in: path
        name: customerId
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentTerm:
                  "$ref": "#/components/schemas/PaymentTermConfig"
                  nullable: true
                paymentTermRemark:
                  type: string
              required:
              - paymentTermRemark
              additionalProperties: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AdminCustomerFinanceProfile"
  "/admin/products/import-jobs":
    post:
      tags:
      - Admin
      summary: Upload Excel for product import/update (image URLs or imagesZip)
      description: Job service orchestrates async execution; business data remains
        owned by domain services.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                excelFile:
                  type: string
                  format: binary
                imagesZip:
                  type: string
                  format: binary
                  description: Optional zip of images referenced by file name in Excel
                imageBaseUrl:
                  type: string
                  description: Optional base URL when Excel lists relative image paths
              required:
              - excelFile
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ImportJob"
  "/admin/shipments/import-jobs":
    post:
      tags:
      - Admin
      summary: Upload Excel for bulk waybill import (order tracking)
      description: Job service orchestrates async execution; business data remains
        owned by domain services.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                excelFile:
                  type: string
                  format: binary
              required:
              - excelFile
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ImportJob"
  "/admin/product-requests/export-jobs":
    post:
      tags:
      - Admin
      summary: Create export job for product requests ("can't find product")
      description: Job service orchestrates async execution; business data remains
        owned by domain services.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                createdAfter:
                  type: string
                  format: date-time
                createdBefore:
                  type: string
                  format: date-time
              additionalProperties: false
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ImportJob"
  "/admin/import-jobs/{jobId}":
    get:
      tags:
      - Admin
      summary: Get import/export job status and results
      parameters:
      - in: path
        name: jobId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ImportJob"
  "/admin/inquiries/{inquiryId}/requirement-profile":
    get:
      tags:
      - Admin
      summary: Get requirement profile for inquiry detail panel
      parameters:
      - in: path
        name: inquiryId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/InquiryRequirementProfile"
  "/admin/suppliers":
    get:
      tags:
      - Admin
      summary: List suppliers for admin operations
      parameters:
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
      - in: query
        name: pageSize
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PagedAdminSupplierList"
  "/admin/suppliers/{supplierId}":
    get:
      tags:
      - Admin
      summary: Get supplier detail
      parameters:
      - in: path
        name: supplierId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AdminSupplier"
    patch:
      tags:
      - Admin
      summary: Update supplier profile
      parameters:
      - in: path
        name: supplierId
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PatchAdminSupplierRequest"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AdminSupplier"
  "/admin/suppliers/{supplierId}/contacts":
    get:
      tags:
      - Admin
      summary: List supplier contacts
      parameters:
      - in: path
        name: supplierId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AdminSupplierContactListResponse"
  "/admin/suppliers/{supplierId}/scorecards":
    get:
      tags:
      - Admin
      summary: List supplier scorecards
      parameters:
      - in: path
        name: supplierId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AdminSupplierScorecardListResponse"
  "/admin/payments/transactions":
    get:
      tags:
      - Admin
      summary: List payment transactions for admin operations
      parameters:
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
      - in: query
        name: pageSize
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PagedPaymentTransactionList"
  "/admin/payments/transactions/{id}":
    get:
      tags:
      - Admin
      summary: Get payment transaction detail
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PaymentTransaction"
  "/admin/payments/audit-logs":
    get:
      tags:
      - Admin
      summary: List payment audit logs
      parameters:
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
      - in: query
        name: pageSize
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PagedPaymentAuditLogList"
  "/admin/payments/webhooks":
    get:
      tags:
      - Admin
      summary: List payment webhooks
      parameters:
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          default: 1
      - in: query
        name: pageSize
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PagedPaymentWebhookList"
  "/admin/payments/webhooks/{id}/replay":
    post:
      tags:
      - Admin
      summary: Replay one payment webhook event
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ReplayWebhookResponse"
  "/admin/miniapp/display-categories":
    get:
      tags:
      - Admin
      summary: List miniapp display categories (including disabled)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AdminMiniappDisplayCategoryListResponse"
    put:
      tags:
      - Admin
      summary: Replace miniapp display categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ReplaceAdminMiniappDisplayCategoriesRequest"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AdminMiniappDisplayCategoryListResponse"
  "/admin/config/feature-flags":
    get:
      tags:
      - Admin
      summary: Get feature flags (e.g., paymentEnabled)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FeatureFlags"
    patch:
      tags:
      - Admin
      summary: Update feature flags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/FeatureFlags"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FeatureFlags"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      "$ref": "./common.yaml#/components/schemas/ErrorResponse"
    MiniLoginRequest:
      "$ref": "./common.yaml#/components/schemas/MiniLoginRequest"
    PasswordLoginRequest:
      "$ref": "./common.yaml#/components/schemas/PasswordLoginRequest"
    AuthResponse:
      "$ref": "./common.yaml#/components/schemas/AuthResponse"
    User:
      "$ref": "./common.yaml#/components/schemas/User"
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        phone:
          type: string
          nullable: true
        ownerSalesUserId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
      - id
      - displayName
      - createdAt
    PagedCustomerList:
      type: object
      properties:
        items:
          type: array
          items:
            "$ref": "#/components/schemas/Customer"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
      required:
      - items
      - page
      - pageSize
      - total
    SalesUserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        phone:
          type: string
          nullable: true
        status:
          type: string
        roles:
          type: array
          items:
            type: string
      required:
      - id
      - displayName
      - status
      - roles
    PagedSalesUserList:
      type: object
      properties:
        items:
          type: array
          items:
            "$ref": "#/components/schemas/SalesUserSummary"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
      required:
      - items
      - page
      - pageSize
      - total
    AdminUserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        phone:
          type: string
          nullable: true
        userType:
          type: string
        status:
          type: string
        roles:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - displayName
      - userType
      - status
      - roles
      - createdAt
      - updatedAt
    PagedAdminUserList:
      type: object
      properties:
        items:
          type: array
          items:
            "$ref": "#/components/schemas/AdminUserSummary"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
      required:
      - items
      - page
      - pageSize
      - total
    PromoteCustomerToSalesResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userType:
          type: string
        status:
          type: string
        roles:
          type: array
          items:
            type: string
        promoted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - userType
      - status
      - roles
      - promoted
      - createdAt
      - updatedAt
    CustomerTag:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
        sort:
          type: integer
        active:
          type: boolean
      required:
      - id
      - name
      - color
      - sort
      - active
    CustomerTagListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            "$ref": "#/components/schemas/CustomerTag"
      required:
      - items
    AdminCustomerOwner:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        phone:
          type: string
          nullable: true
      required:
      - id
      - displayName
    AdminCustomer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        phone:
          type: string
          nullable: true
        ownerSalesUserId:
          type: string
          format: uuid
          nullable: true
        ownerSales:
          "$ref": "#/components/schemas/AdminCustomerOwner"
          nullable: true
        tags:
          type: array
          items:
            "$ref": "#/components/schemas/CustomerTag"
        createdAt:
          type: string
          format: date-time
      required:
      - id
      - displayName
      - tags
      - createdAt
    PagedAdminCustomerList:
      type: object
      properties:
        items:
          type: array
          items:
            "$ref": "#/components/schemas/AdminCustomer"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
      required:
      - items
      - page
      - pageSize
      - total
    TransferCustomerRequest:
      type: object
      properties:
        toSalesUserId:
          type: string
          format: uuid
        reason:
          type: string
          maxLength: 200
      required:
      - toSalesUserId
      additionalProperties: false
    TransferCustomersRequest:
      type: object
      properties:
        customerIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        toSalesUserId:
          type: string
          format: uuid
        reason:
          type: string
          maxLength: 200
      required:
      - customerIds
      - toSalesUserId
      additionalProperties: false
    BatchTransferResult:
      type: object
      properties:
        requestedCount:
          type: integer
        transferredCount:
          type: integer
        unchangedCount:
          type: integer
      required:
      - requestedCount
      - transferredCount
      - unchangedCount
    CreateCustomerTagRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 30
        color:
          type: string
          description: Hex color, e.g. #FF8800
        sort:
          type: integer
        active:
          type: boolean
      required:
      - name
      - color
      additionalProperties: false
    UpdateCustomerTagRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 30
        color:
          type: string
        sort:
          type: integer
        active:
          type: boolean
      additionalProperties: false
    BatchUpdateCustomerTagsRequest:
      type: object
      properties:
        customerIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        addTagIds:
          type: array
          items:
            type: string
            format: uuid
        removeTagIds:
          type: array
          items:
            type: string
            format: uuid
      required:
      - customerIds
      additionalProperties: false
    BatchTagUpdateResult:
      type: object
      properties:
        requestedCount:
          type: integer
        updatedCount:
          type: integer
      required:
      - requestedCount
      - updatedCount
    InquiryRequirementProfile:
      type: object
      properties:
        requirementNo:
          type: string
        title:
          type: string
        companyName:
          type: string
        contactName:
          type: string
        contactPhone:
          type: string
        expectedQty:
          type: string
        targetUnitPrice:
          type: string
        priority:
          type: string
        source:
          type: string
        summary:
          type: string
        attachments:
          type: array
          items:
            type: string
      required:
      - requirementNo
      - title
      - companyName
      - contactName
      - contactPhone
      - expectedQty
      - targetUnitPrice
      - priority
      - source
      - summary
      - attachments
    AdminSupplier:
      type: object
      properties:
        id:
          type: string
          format: uuid
        supplierCode:
          type: string
        name:
          type: string
        country:
          type: string
        city:
          type: string
        categories:
